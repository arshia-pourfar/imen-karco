<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/styles.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js">
    </script>
    <script src="scripts/jQuery-library.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="scripts/all.min.js" defer></script>
    <script src="scripts/product-list.js"></script>
    <title>Document</title>
</head>

<body class="container-fluid product-page bg-light p-0">

    <!-- NAVIGATION -->
    <nav id="nav" class="navbar navbar-expand-lg navbar-light bg-light shadow">
        <a class="logo navbar-brand ms-4" href="index.html">
            <img src="images/logo/logo.png" alt="Imen-Karco Logo" class="rounded-pill">
        </a>

        <button class="menu navbar-toggler custom-toggler" aria-label="Main Menu Toggle navigation"
            onclick="this.classList.toggle('opened');this.setAttribute('aria-expanded', this.classList.contains('opened'))"
            type="button" data-bs-toggle="collapse" data-bs-target="#myNavbar" aria-expanded="false">
            <svg width="100" height="100" viewBox="0 0 100 100">
                <path class="line line1"
                    d="M 20,29.000046 H 80.000231 C 80.000231,29.000046 94.498839,28.817352 94.532987,66.711331 94.543142,77.980673 90.966081,81.670246 85.259173,81.668997 79.552261,81.667751 75.000211,74.999942 75.000211,74.999942 L 25.000021,25.000058" />
                <path class="line line2" d="M 20,50 H 80" />
                <path class="line line3"
                    d="M 20,70.999954 H 80.000231 C 80.000231,70.999954 94.498839,71.182648 94.532987,33.288669 94.543142,22.019327 90.966081,18.329754 85.259173,18.331003 79.552261,18.332249 75.000211,25.000058 75.000211,25.000058 L 25.000021,74.999942" />
            </svg>
        </button>

        <div class="collapse navbar-collapse pt-2 bg-light" id="myNavbar">
            <ul class="navbar-nav">
                <li class="click-home-page nav-item h5"><a href="index.html" class="btn-home-page nav-link"><i
                            class="fas ms-1 fa-home"></i>صفحه
                        اصلی</a></li>
                <li class="scroll-to-product nav-item h5"><a href="index.html" class="btn-products nav-link"><i
                            class="fas ms-1 fa-store"></i>محصولات</a>
                </li>
                <li class="click-info nav-item h5">
                    <a class="btn-info nav-link" href="about-us.html">
                        <i class="fas ms-1 fa-info-circle"></i>درباره ما</a>
                </li>
                <li class="click-phone nav-item h5"><a href="index.html" class="btn-phone nav-link"><i
                            class="fas ms-1 fa-phone"></i>تماس
                        با
                        ما</a>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container-fluid product-slide">
        <div class="row">
            <div class="product-image col-lg-6">
                <div id="demo" class="carousel slide text-center" data-bs-ride="carousel">
                    <div class="carousel-indicators">
                        <img class="bottom-image" type="button" data-bs-target="#demo" data-bs-slide-to="3" src=""
                            alt="">
                        <img class="bottom-image" type="button" data-bs-target="#demo" data-bs-slide-to="2" src=""
                            alt="">
                        <img class="bottom-image" type="button" data-bs-target="#demo" data-bs-slide-to="1" src=""
                            alt="">
                        <img class="bottom-image active" type="button" data-bs-target="#demo" data-bs-slide-to="0"
                            src="" alt="">
                    </div>
                    <div class="carousel-inner">
                        <div class="carousel-item image-1 active">
                            <img src="" alt="">
                        </div>
                        <div class="carousel-item image-2">
                            <img src="" alt="">
                        </div>
                        <div class="carousel-item image-3">
                            <img src="" alt="">
                        </div>
                        <div class="carousel-item image-4">
                            <img src="" alt="">
                        </div>
                        <button class="carousel-control-prev text-dark h1" type="button" data-bs-target="#demo"
                            data-bs-slide="prev">
                            &#10095;
                        </button>
                        <button class="carousel-control-next text-dark h1" type="button" data-bs-target="#demo"
                            data-bs-slide="next">
                            &#10094;
                        </button>
                    </div>
                </div>
            </div>
            <div class="about-product col-lg-6 mt-3">
                <h3 class="title"></h3>
                <div class="details h5 lh-base material"> تست : <span></span></div>
                <div class="details h5 lh-base material"> تست : <span></span></div>
                <div class="details h5 lh-base material"> تست : <span></span></div>
                <div class="details h5 lh-base material"> تست : <span></span></div>
                <div class="details h5 lh-base description"> توضیحات : <span></span></div>
            </div>
        </div>
    </div>
</body>

<script>
    pageHeight = $(window).height();
    $('.product-page').css('height', pageHeight);
    let id = localStorage.getItem("idClicked");
    // slideshow
    $(".product-page .product-image .carousel-inner .image-1 img").attr("src", "" + allProduct[id].bottomImage1 + "");
    $(".product-page .product-image .carousel-inner .image-2 img").attr("src", "" + allProduct[id].bottomImage2 + "");
    $(".product-page .product-image .carousel-inner .image-3 img").attr("src", "" + allProduct[id].bottomImage3 + "");
    $(".product-page .product-image .carousel-inner .image-4 img").attr("src", "" + allProduct[id].bottomImage4 + "");
    $(".product-page .product-image .bottom-image").attr("src", "" + allProduct[id].bottomImage1 + "");
    $(".product-page .product-image .bottom-image").attr("src", "" + allProduct[id].bottomImage2 + "");
    $(".product-page .product-image .bottom-image").attr("src", "" + allProduct[id].bottomImage3 + "");
    $(".product-page .product-image .bottom-image").attr("src", "" + allProduct[id].bottomImage4 + "");
    $(".product-page .title").text(allProduct[id].title);
    $(".product-page .about-product .material span").text(allProduct[id].material);
    $(".product-page .about-product .description span").text(allProduct[id].description);
</script>

</html>
